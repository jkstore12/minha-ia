name: "🐞 Bug Report"
description: Reporte um comportamento incorreto ou erro
title: "[BUG] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar. Antes de preencher, verifique:
        - [ ] Este bug nao foi reportado antes (pesquise em Issues)
        - [ ] Nao e uma vulnerabilidade de seguranca (use [SECURITY.md](../../SECURITY.md) para isso)

  - type: textarea
    id: summary
    attributes:
      label: "Resumo"
      description: Uma frase descrevendo o problema.
      placeholder: "Ex: Chat retorna 500 quando anexo PDF tem mais de 5 paginas"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: "Passos para reproduzir"
      description: Numerados e especificos. Inclua inputs exatos quando relevante.
      placeholder: |
        1. Va para /chat
        2. Anexe um PDF de 6 paginas
        3. Envie a mensagem "resuma"
        4. Veja o erro
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Comportamento esperado"
      description: O que voce esperava que acontecesse.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Comportamento atual"
      description: O que aconteceu de fato. Inclua mensagens de erro literais.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots / Logs"
      description: Cole outputs, stack traces, ou links para screenshots.

  - type: dropdown
    id: environment
    attributes:
      label: "Ambiente"
      options:
        - "Local (npm run dev)"
        - "Vercel (production)"
        - "Vercel (preview deploy)"
        - "Outro"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: "Node.js version"
      placeholder: "20.11.0"
    validations:
      required: false

  - type: input
    id: commit
    attributes:
      label: "Commit SHA (se conhecido)"
      placeholder: "abc1234"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Contexto adicional"
      description: Qualquer outra coisa relevante.
